services:
  api:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - orbital-data:/app/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/orbital-guardian.db

volumes:
  orbital-data:
